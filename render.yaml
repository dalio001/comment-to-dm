services:
  - type: web
    name: comment-to-dm
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      # DATABASE_URL is wired automatically to the managed Postgres below, so
      # config + campaigns survive redeploys (free SQLite on Render is ephemeral).
      - key: DATABASE_URL
        fromDatabase:
          name: comment-to-dm-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: comment-to-dm-db
    plan: free

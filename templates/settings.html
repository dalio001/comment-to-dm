{% extends "base.html" %}
{% block title %}Settings · Comment-to-DM{% endblock %}
{% block content %}
<header class="page-head">
  <h1>Settings</h1>
  <p class="muted">Credentials are stored in the local database, never exposed to the browser.</p>
</header>

<form id="config-form" class="card">
  <h2>Instagram</h2>
  <label>Instagram Access Token
    <input type="password" name="instagram_access_token" placeholder="leave blank to keep existing" autocomplete="off" />
    <small id="ig-token-state" class="muted"></small>
  </label>
  <label>Instagram Business Account ID
    <input type="text" name="instagram_business_account_id" placeholder="17841400000000000" />
  </label>

  <h2>Facebook</h2>
  <label>Facebook Page ID
    <input type="text" name="facebook_page_id" placeholder="1234567890" />
  </label>
  <label>Facebook Page Access Token
    <input type="password" name="facebook_page_access_token" placeholder="leave blank to keep existing" autocomplete="off" />
    <small id="fb-token-state" class="muted"></small>
  </label>

  <button type="submit" class="btn-primary">Save credentials</button>
</form>
{% endblock %}
{% block scripts %}<script src="/static/settings.js"></script>{% endblock %}
